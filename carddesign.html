<html>
    <head>
        <style>
            .card{
                background-color:black;
                backgroundradius:10px;
                box-shadow: 0 4px 8px rgba (0,0,0,0.1);
                padding: 150px;
                margin: 50px auto;
                max-width: 1300px;
                transition: transform 0.3s;
            }
            .card:hover{
                transform: translate Y(-5PX);
                box-shadow: 0 8PX 16PX RGBA(0,0,0,0.2);
            }
            .card-title{
                color: red;
                font-size: 59px;
                margin-bottom: 10px;
            }
            .card-text{
                color:pink;
                line-height: 1.;
            }
            .btn{
                background-color:yellowgreen;
                color: white;
                padding: 10px 20px;
                border: 570;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px;
            }
            .btn:hover{
                background-color: black;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2 class="card-title"> beautiful card</h2>
            <p class="card-text"> this is a card component styled with internal cass. it has hover effects and a modern design</p>
            <button class="btn">  cilck me</button>
        </div>
    </body>
</html>
